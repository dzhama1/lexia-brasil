<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lexia Brasil</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
        input { width: 70%; padding: 12px; font-size: 16px; }
        button { padding: 12px 25px; font-size: 16px; background: #0066cc; color: white; border: none; cursor: pointer; }
        #answer { margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>🇧🇷 Lexia Brasil</h1>
    <p><strong>ИИ-помощник по бразильским законам, налогам и финансам</strong></p>

    <input type="text" id="question" placeholder="Какой налог платит ИП в Бразилии?">
    <button onclick="askAI()">Спросить ИИ</button>

    <div id="answer"></div>

    <script>
        async function askAI() {
            const q = document.getElementById('question').value;
            if (!q) return;

            document.getElementById('answer').innerHTML = 'ИИ думает...';

            try {
                const response = await fetch('https://lexia-brasil-45srs7410-dzhama1s-projects.vercel.app/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q })
                });

                const data = await response.json();
                document.getElementById('answer').innerHTML = '<strong>Ответ ИИ:</strong><br>' + data.answer;
            } catch (e) {
                document.getElementById('answer').innerHTML = 'Ошибка: ' + e.message;
            }
        }
    </script>
</body>
</html>
